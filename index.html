<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Portfolio</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { color: #2c3e50; margin-bottom: 5px; }
        p { color: #7f8c8d; font-size: 1.1rem; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 500px; width: 90%; text-align: center; }
        .project-card { border-left: 5px solid #3498db; background: #ecf0f1; padding: 15px; margin: 15px 0; border-radius: 4px; text-align: left; }
        .project-card h3 { margin: 0 0 5px 0; color: #2c3e50; }
        .project-card p { margin: 0; font-size: 0.95rem; color: #555; }
        .status-badge { display: inline-block; background-color: #2ecc71; color: white; padding: 5px 10px; border-radius: 20px; font-size: 0.85rem; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <h1>Welcome to My Portfolio</h1>
        <p>Full-Stack Developer Student</p>
    </header>

    <div class="container">
        <h2>My Deployed Projects</h2>
        
        <div class="project-card">
            <h3>Personal Portfolio System</h3>
            <p>A full-stack web application linking a responsive UI frontend with a functional Node.js/Express backend API endpoint.</p>
        </div>

        <div class="status-badge">App Connected Successfully</div>
    </div>

</body>
</html>
