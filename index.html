<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Management Application</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .hidden { display: none !important; }
        .box { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; margin-bottom: 20px; }
        input, select, button { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { background-color: #3498db; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #2980b9; }
        .task-card { background: #f9f9f9; border-left: 5px solid #f39c12; padding: 15px; margin: 10px 0; border-radius: 4px; text-align: left; display: flex; justify-content: space-between; align-items: center; }
        .task-card.Completed { border-left-color: #2ecc71; }
        .btn-group { display: flex; gap: 5px; }
        .action-btn { padding: 5px 10px; font-size: 0.8rem; background-color: #e74c3c; margin: 0; }
        .status-btn { background-color: #2ecc71; }
    </style>
</head>
<body>

    <div id="login-screen" class="box">
        <h2>Task App Login</h2>
        <p style="font-size: 0.85rem; color: #777;">Hint: User 'admin' | Pass 'admin123'</p>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="handleLogin()">Login</button>
        <p id="login-error" style="color: red;" class="hidden"></p>
    </div>

    <div id="main-dashboard" class="box hidden">
        <h2>My Task Manager Dashboard</h2>
        <button onclick="handleLogout()" style="background-color: #95a5a6; width: auto; float: right; padding: 5px 10px;">Logout</button>
        
        <div style="clear: both; margin-top: 20px;">
            <input type="text" id="task-title" placeholder="Task Title">
            <input type="text" id="task-desc" placeholder="Task Description">
            <button onclick="createTask()" style="background-color: #2ecc71;">Add Task +</button>
        </div>

        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
        <h3>Tasks List</h3>
        <div id="tasks-container">Loading tasks...</div>
    </div>

    <script>
        // CRUCIAL: Replace this string with your real live Vercel backend URL
       const API_URL = "https://portfolio-backend-lovat-iota.vercel.app";

        function handleLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            fetch(`${API_URL}/api/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, password: pass })
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('main-dashboard').classList.remove('hidden');
                    fetchTasks();
                } else {
                    const errEl = document.getElementById('login-error');
                    errEl.innerText = data.message;
                    errEl.classList.remove('hidden');
                }
            });
        }

        function handleLogout() {
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('main-dashboard').classList.add('hidden');
        }

        function fetchTasks() {
            fetch(`${API_URL}/api/tasks`)
                .then(res => res.json())
                .then(tasks => {
                    const container = document.getElementById('tasks-container');
                    container.innerHTML = tasks.length === 0 ? '<p>No tasks found. Create one!</p>' : '';
                    tasks.forEach(task => {
                        container.innerHTML += `
                            <div class="task-card ${task.status}">
                                <div>
                                    <strong>${task.title}</strong><br>
                                    <span style="font-size:0.9rem; color:#555;">${task.description}</span><br>
                                    <span style="font-size:0.8rem; font-weight:bold; color:${task.status === 'Completed' ? '#2ecc71' : '#f39c12'}">[${task.status}]</span>
                                </div>
                                <div class="btn-group">
                                    ${task.status === 'Pending' ? `<button class="action-btn status-btn" onclick="toggleStatus('${task._id}', 'Completed')">✓</button>` : `<button class="action-btn status-btn" style="background:#f39c12;" onclick="toggleStatus('${task._id}', 'Pending')">⟲</button>`}
                                    <button class="action-btn" onclick="deleteTask('${task._id}')">✕</button>
                                </div>
                            </div>
                        `;
                    });
                });
        }

        function createTask() {
            const title = document.getElementById('task-title').value;
            const description = document.getElementById('task-desc').value;
            if(!title) return alert("Please enter a title");

            fetch(`${API_URL}/api/tasks`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, description })
            }).then(() => {
                document.getElementById('task-title').value = '';
                document.getElementById('task-desc').value = '';
                fetchTasks();
            });
        }

        function toggleStatus(id, newStatus) {
            fetch(`${API_URL}/api/tasks/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: newStatus })
            }).then(() => fetchTasks());
        }

        function deleteTask(id) {
            fetch(`${API_URL}/api/tasks/${id}`, { method: 'DELETE' })
                .then(() => fetchTasks());
        }
    </script>
</body>
</html>
